<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Wave X: Shameer Legacy Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; user-select: none; }
        canvas { display: block; border-radius: 4px; box-shadow: 0 0 30px rgba(0,251,255,0.2); }
        #overlay, #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: rgba(0,0,0,0.92); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .main-title { font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #00fbff; letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .credit-text { color: #00fbff; font-size: 14px; letter-spacing: 5px; margin-bottom: 30px; font-weight: 700; text-transform: uppercase; }
        .pause-icon { position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.8); cursor: pointer; display: none; font-size: 24px; font-weight: 900; z-index: 101; }
        #ui { position: absolute; top: 15px; width: 95%; display: flex; justify-content: space-between; align-items: center; color: #fff; pointer-events: none; z-index: 100; font-size: 14px; letter-spacing: 1.5px; }
        .nav-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        .nav-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; font-weight: 700; text-transform: uppercase; transition: 0.2s; padding: 5px 10px;}
        .nav-btn.active { color: #00fbff; border-bottom: 2px solid #00fbff; font-weight: 900;}
        .section { display: none; width: 90%; max-width: 750px; text-align: center; height: 60vh; overflow-y: auto; padding: 10px;}
        .section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; color: #444; cursor: pointer; font-size: 12px; font-weight: 700; text-align: center; transition: background 0.1s; }
        .card:hover { background: #111; }
        .card.active { border-color: #00fbff; color: #fff; box-shadow: 0 0 15px rgba(0,251,255,0.3); background: rgba(0,251,255,0.05);}
        .card.owned { color: #aaa; }
        .card.locked { color: #ffd700; }
        .skin-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .price-tag { font-size: 10px; color: #ffd700; font-weight: 900; display: flex; justify-content: center; align-items: center; gap: 3px;}
        .price-tag::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #ffd700; border-radius: 50%;}
        .big-btn { background: none; border: 1px solid #fff; color: #fff; padding: 12px 50px; cursor: pointer; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; transition: 0.3s; margin-top: 10px; }
        .big-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        .section::-webkit-scrollbar { width: 5px; }
        .section::-webkit-scrollbar-track { background: #050505; }
        .section::-webkit-scrollbar-thumb { background: #1a1a1a; }
        .section::-webkit-scrollbar-thumb:hover { background: #00fbff; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div class="pause-icon" id="pauseBtn" onclick="togglePause()">||</div>

    <div id="ui">
        <div style="display: flex; gap: 20px;">
            <span>PROG: <span id="dist-val">0</span>%</span>
            <span style="color: #00fbff; font-weight: 900; font-size: 11px;">DESIGNED BY SHAMEER</span>
        </div>
        <div style="color: #ffd700; font-size: 16px;">ORBS: <span id="coin-val" style="font-weight: 900;">0</span></div>
        <div id="hull-val" style="color: #ff00ff; font-size: 16px;">♥♥♥</div>
    </div>

    <div id="overlay">
        <h1 class="main-title">PAUSED</h1>
        <p class="credit-text">BY SHAMEER</p>
        <button class="big-btn" onclick="togglePause()">RESUME</button>
        <button class="big-btn" onclick="location.reload()" style="border-color: #ff0055; color: #ff0055;">QUIT</button>
    </div>

    <div id="menu" style="display: flex;">
        <h1 class="main-title">NEON WAVE X</h1>
        <p class="credit-text">SHAMEER LEGACY EDITION</p>
        <div class="nav-bar">
            <button class="nav-btn active" id="btnMain" onclick="showSection('main')">PLAY</button>
            <button class="nav-btn" id="btnShop" onclick="showSection('shop')">SHIP SHOP</button>
        </div>
        <div id="section-main" class="section active">
            <p style="color: #555; font-size: 12px; margin-bottom: 8px;">SELECT DIFFICULTY</p>
            <div class="grid" id="level-grid" style="max-width: 400px; margin-left: auto; margin-right: auto;"></div>
            <p style="color: #444; font-size: 10px; margin-top: 20px;">LAST DIST: <span id="last-dist">0</span>% | BEST: <span id="best-dist">0</span>%</p>
            <button class="big-btn" onclick="launchGame()">START GAME</button>
        </div>
        <div id="section-shop" class="section">
            <p style="color: #ffd700; margin-bottom: 15px; font-size: 18px; font-weight: 900;">WALLET: <span id="total-coins-display">0</span> ORBS</p>
            <div class="grid" id="skin-grid"></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSfx(f, t, d, v) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const crafts = [
        { name: "DELTA", color: "#00fbff", price: 0, unlocked: true, icon: "△" },
        { name: "ARROW", color: "#ff00ff", price: 250, unlocked: false, icon: "▶" },
        { name: "TITAN", color: "#ffd700", price: 500, unlocked: false, icon: "◆" },
        { name: "GHOST", color: "#ffffff", price: 750, unlocked: false, icon: "✧" },
        { name: "PHANTOM", color: "#55ff55", price: 1000, unlocked: false, icon: "❖" },
        { name: "VOID", color: "#aa55ff", price: 1250, unlocked: false, icon: "♠" },
        { name: "WASP", color: "#ffff00", price: 1500, unlocked: false, icon: "⬡" },
        { name: "LEGEND", color: "#ff5555", price: 1750, unlocked: false, icon: "★" },
        { name: "BLADE", color: "#00ffcc", price: 2000, unlocked: false, icon: "▶" },
        { name: "VORTEX", color: "#cc55ff", price: 2250, unlocked: false, icon: "🌀" },
        { name: "GENESIS", color: "#ff99ff", price: 2500, unlocked: false, icon: "⎊" },
        { name: "AURORA", color: "#99ffff", price: 3000, unlocked: false, icon: "✵" }
    ];

    const levels = [
        { name: "EASY", speed: 5, grav: 0.22, jump: -4.8, bgStarSpeed: 0.2 },
        { name: "NORMAL", speed: 8, grav: 0.32, jump: -5.8, bgStarSpeed: 0.3 },
        { name: "HARD", speed: 11, grav: 0.42, jump: -6.8, bgStarSpeed: 0.4 },
        { name: "GOD", speed: 14, grav: 0.52, jump: -7.8, bgStarSpeed: 0.5 }
    ];

    let active = false, paused = false, score = 0, coins = 0, bestDist = parseInt(localStorage.getItem('sh_best')) || 0;
    let totalCoins = parseInt(localStorage.getItem('sh_coins_v4')) || 0;
    let ownedSkins = JSON.parse(localStorage.getItem('sh_skins_v4')) || [0];
    let selectedSkin = parseInt(localStorage.getItem('sh_selected_skin_v4')) || 0;
    let selectedLevel = parseInt(localStorage.getItem('sh_selected_level_v4')) || 1;
    let lives = 3;
    let player = { x: 200, y: 0, vy: 0 };
    let obstacles = [], gameOrbs = [], particles = [], stars = [];

    function resize() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        initStars();
    }
    window.addEventListener('resize', resize);

    function initStars() {
        stars = [];
        for(let i=0; i<150; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 + 0.1});
        }
    }

    function initUI() {
        const lg = document.getElementById('level-grid'); lg.innerHTML = '';
        levels.forEach((l, i) => {
            let d = document.createElement('div');
            d.className = `card ${i === selectedLevel ? 'active' : ''}`;
            d.innerText = l.name;
            d.onclick = () => { selectedLevel = i; playSfx(400, 'sine', 0.1, 0.1); localStorage.setItem('sh_selected_level_v4', i); initUI(); };
            lg.appendChild(d);
        });
        const sg = document.getElementById('skin-grid'); sg.innerHTML = '';
        crafts.forEach((s, i) => {
            s.unlocked = ownedSkins.includes(i);
            let d = document.createElement('div');
            d.className = `card ${i === selectedSkin ? 'active' : ''} ${s.unlocked ? 'owned' : 'locked'}`;
            let displayPrice = s.unlocked ? (i === selectedSkin ? 'ACTIVE' : 'SELECT') : `<span class="price-tag">${s.price}</span>`;
            d.innerHTML = `<span class="skin-icon" style="color: ${s.color}">${s.icon}</span><span style="color: #fff; font-size: 11px;">${s.name}</span><br><span style="color: ${s.unlocked? '#555': '#ffd700'}; font-size: 10px;">${displayPrice}</span>`;
            
            d.onclick = () => {
                if(s.unlocked) { 
                    selectedSkin = i; playSfx(600, 'sine', 0.1, 0.1); localStorage.setItem('sh_selected_skin_v4', i);
                }
                else if(totalCoins >= s.price) {
                    totalCoins -= s.price; ownedSkins.push(i); selectedSkin = i;
                    localStorage.setItem('sh_coins_v4', totalCoins);
                    localStorage.setItem('sh_skins_v4', JSON.stringify(ownedSkins));
                    localStorage.setItem('sh_selected_skin_v4', i);
                    playSfx(800, 'square', 0.2, 0.15);
                } else {
                    playSfx(200, 'square', 0.2, 0.1);
                }
                initUI();
            };
            sg.appendChild(d);
        });
        document.getElementById('total-coins-display').innerText = totalCoins;
        document.getElementById('best-dist').innerText = Math.floor(bestDist/10);
    }

    function showSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('section-'+name).classList.add('active');
        document.getElementById('btn'+name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    }

    function launchGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        active = true; paused = false; score = 0; coins = 0; lives = 3;
        obstacles = []; gameOrbs = []; particles = [];
        player.y = canvas.height/2; player.vy = 0;
        playSfx(500, 'square', 0.4, 0.1);
        loop();
    }

    function togglePause() {
        if(!active) return;
        paused = !paused;
        document.getElementById('overlay').style.display = paused ? 'flex' : 'none';
        if(!paused) { loop(); }
    }

    const tap = () => { 
        if(active && !paused) { 
            player.vy = levels[selectedLevel].jump;
            playSfx(180, 'triangle', 0.12, 0.08);
            let pColor = crafts[selectedSkin].color;
            for(let i=0; i<6; i++) {
                particles.push({
                    x: player.x - 15, y: player.y + 10,
                    vx: -Math.random()*4, vy: (Math.random()-0.5)*3 + 2, 
                    life: 1, c: pColor, size: Math.random()*2 + 1
                });
            }
        } 
    };
    window.onkeydown = (e) => { if(e.code==='Space') tap(); if(e.code==='KeyP') togglePause(); };
    window.onmousedown = tap;

    function drawSpikedBlock(ctx, o, c) {
        ctx.fillStyle = "#0a0a0a"; ctx.strokeStyle = c; ctx.lineWidth = 3;
        ctx.beginPath();
        if(o.pos === 'top') {
            ctx.rect(o.x, 0, o.w, o.h); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.lineWidth = 2;
            for(let sx = o.x; sx <= o.x + o.w; sx += 20) {
                ctx.moveTo(sx, o.h); ctx.lineTo(sx+10, o.h+15); ctx.lineTo(sx+20, o.h);
            }
        } else {
            ctx.rect(o.x, canvas.height-o.h, o.w, o.h); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.lineWidth = 2;
            for(let sx = o.x; sx <= o.x + o.w; sx += 20) {
                ctx.moveTo(sx, canvas.height-o.h); ctx.lineTo(sx+10, canvas.height-o.h-15); ctx.lineTo(sx+20, canvas.height-o.h);
            }
        }
        ctx.stroke();
    }

    function loop() {
        if(!active || paused) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        const lvl = levels[selectedLevel];
        const skin = crafts[selectedSkin];
        let pColor = skin.color;

        stars.forEach(s => {
            s.x -= lvl.speed * lvl.bgStarSpeed;
            if(s.x < 0) s.x = canvas.width;
            ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        player.vy += lvl.grav;
        player.y += player.vy;
        if(player.y < 0 || player.y > canvas.height) hit();

        if(score % 2 === 0) {
            particles.push({
                x: player.x - 15, y: player.y,
                vx: -lvl.speed, vy: (Math.random()-0.5)*2, 
                life: 1, c: pColor, size: Math.random()*3 + 1
            });
        }
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03; p.size *= 0.96;
            ctx.fillStyle = `rgba(${hexToRgb(p.c)}, ${p.life})`;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            if(p.life <= 0) particles.splice(i, 1);
        });

        if(score % 60 === 0) {
            let h = canvas.height * (0.2 + Math.random() * 0.3);
            obstacles.push({x: canvas.width, h: h, w: 70, pos: Math.random() > 0.5 ? 'top' : 'bottom'});
        }
        obstacles.forEach((o, i) => {
            o.x -= lvl.speed; 
            drawSpikedBlock(ctx, o, pColor);
            if(player.x+15 > o.x && player.x-15 < o.x+o.w) {
                let spikedH = o.h + 15;
                if(o.pos === 'top' && player.y-10 < spikedH) hit();
                if(o.pos === 'bottom' && player.y+10 > canvas.height-spikedH) hit();
            }
            if(o.x < -150) obstacles.splice(i, 1);
        });

        if(score % 100 === 0) gameOrbs.push({x: canvas.width, y: Math.random()*canvas.height * 0.8 + canvas.height*0.1});
        gameOrbs.forEach((orb, i) => {
            orb.x -= lvl.speed; ctx.fillStyle = "#ffd700";
            ctx.beginPath(); ctx.arc(orb.x, orb.y, 9, 0, 7); ctx.fill();
            if(Math.hypot(player.x-orb.x, player.y-orb.y) < 32) {
                coins += 5; totalCoins += 5; gameOrbs.splice(i, 1);
                playSfx(1100, 'sine', 0.15, 0.08); localStorage.setItem('sh_coins_v4', totalCoins);
            }
        });

        ctx.fillStyle = pColor; ctx.save();
        ctx.translate(player.x, player.y); ctx.rotate(player.vy * 0.09);
        ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(-15,10); ctx.lineTo(-10,0); ctx.lineTo(-15,-10); ctx.fill();
        ctx.restore();

        score++; 
        document.getElementById('dist-val').innerText = Math.floor(score/10);
        document.getElementById('coin-val').innerText = coins;
        document.getElementById('hull-val').innerText = "♥".repeat(lives);
        requestAnimationFrame(loop);
    }

    function hit() {
        lives--; playSfx(90, 'square', 0.35, 0.25);
        obstacles = []; gameOrbs = []; player.y = canvas.height/2; player.vy = 0;
        if(lives <= 0) { 
            active = false; paused = false; document.getElementById('menu').style.display = 'flex'; 
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('last-dist').innerText = Math.floor(score/10);
            if(score > bestDist) { bestDist = score; localStorage.setItem('sh_best', bestDist); }
            localStorage.setItem('sh_coins_v4', totalCoins);
            initUI(); 
        }
    }

    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `${r},${g},${b}`;
    }

    resize(); initUI();
</script>
</body>
</html>
