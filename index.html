<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Wave X: Shameer Legacy Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; user-select: none; }
        canvas { display: block; border-radius: 4px; box-shadow: 0 0 30px rgba(0,251,255,0.2); }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .main-title { font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #00fbff; letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .credit-text { color: #00fbff; font-size: 14px; letter-spacing: 5px; margin-bottom: 30px; font-weight: 700; text-transform: uppercase; }
        #ui { position: absolute; top: 15px; width: 95%; display: flex; justify-content: space-between; align-items: center; color: #fff; pointer-events: none; z-index: 100; font-size: 14px; letter-spacing: 1.5px; }
        .nav-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        .nav-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; font-weight: 700; text-transform: uppercase; transition: 0.2s; padding: 5px 10px;}
        .nav-btn.active { color: #00fbff; border-bottom: 2px solid #00fbff; font-weight: 900;}
        .section { display: none; width: 90%; max-width: 750px; text-align: center; height: 60vh; overflow-y: auto; padding: 10px;}
        .section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; color: #444; cursor: pointer; font-size: 12px; font-weight: 700; text-align: center; transition: 0.2s; }
        .card:hover { background: #111; border-color: #333; }
        .card.active { border-color: #00fbff; color: #fff; box-shadow: 0 0 15px rgba(0,251,255,0.3); background: rgba(0,251,255,0.05);}
        .card.owned { color: #aaa; }
        .card.locked { color: #ffd700; }
        .skin-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .price-tag { font-size: 10px; color: #ffd700; font-weight: 900; }
        .big-btn { background: none; border: 1px solid #fff; color: #fff; padding: 12px 50px; cursor: pointer; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; transition: 0.3s; margin-top: 10px; }
        .big-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div>PROG: <span id="dist-val">0</span>% | BEST: <span id="best-ui">0</span>%</div>
        <div style="color: #ffd700;">ORBS: <span id="coin-val">0</span></div>
        <div id="hull-val" style="color: #ff00ff;">♥♥♥</div>
    </div>

    <div id="menu">
        <h1 class="main-title">NEON WAVE X</h1>
        <p class="credit-text">MADE BY SHAMEER</p>
        <div class="nav-bar">
            <button class="nav-btn active" id="btnMain" onclick="showSection('main')">PLAY</button>
            <button class="nav-btn" id="btnShop" onclick="showSection('shop')">SHIP SHOP</button>
        </div>
        <div id="section-main" class="section active">
            <p style="color: #555; margin-bottom: 15px;">SELECT DIFFICULTY</p>
            <div class="grid" id="level-grid" style="max-width: 500px; margin: 0 auto;"></div>
            <button class="big-btn" onclick="launchGame()">START GAME</button>
        </div>
        <div id="section-shop" class="section">
            <p style="color: #ffd700; margin-bottom: 15px;">ORBS: <span id="total-coins-display">0</span></p>
            <div class="grid" id="skin-grid"></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const crafts = [
        { name: "DELTA", color: "#00fbff", price: 0, icon: "△" },
        { name: "ARROW", color: "#ff00ff", price: 100, icon: "▶" },
        { name: "TITAN", color: "#ffd700", price: 250, icon: "◆" },
        { name: "GHOST", color: "#ffffff", price: 500, icon: "✧" },
        { name: "VOID", color: "#aa55ff", price: 750, icon: "♠" },
        { name: "WASP", color: "#ffff00", price: 1000, icon: "⬡" },
        { name: "LEGEND", color: "#ff5555", price: 1500, icon: "★" },
        { name: "BLADE", color: "#00ffcc", price: 2000, icon: "▶" },
        { name: "VORTEX", color: "#cc55ff", price: 2500, icon: "🌀" },
        { name: "GENESIS", color: "#ff99ff", price: 3000, icon: "⎊" },
        { name: "AURORA", color: "#99ffff", price: 4000, icon: "✵" },
        { name: "ULTRA", color: "#ff00aa", price: 5000, icon: "💎" }
    ];

    const levels = [
        { name: "EASY", speed: 4, grav: 0.18, jump: -4.5 },
        { name: "NORMAL", speed: 6, grav: 0.25, jump: -5.5 },
        { name: "HARD", speed: 9, grav: 0.35, jump: -6.5 },
        { name: "LEGEND", speed: 12, grav: 0.45, jump: -7.5 },
        { name: "GOD LEVEL", speed: 16, grav: 0.55, jump: -9.0 }
    ];

    let active = false, score = 0, coins = 0, lives = 3;
    let totalCoins = parseInt(localStorage.getItem('sh_coins')) || 0;
    let ownedSkins = JSON.parse(localStorage.getItem('sh_skins')) || [0];
    let selectedSkin = parseInt(localStorage.getItem('sh_skin_idx')) || 0;
    let selectedLevel = 1;
    let bestDist = parseInt(localStorage.getItem('sh_best')) || 0;

    let player = { x: 150, y: 300, vy: 0 };
    let obstacles = [], gameOrbs = [];

    function initUI() {
        const lg = document.getElementById('level-grid'); lg.innerHTML = '';
        levels.forEach((l, i) => {
            const d = document.createElement('div');
            d.className = `card ${i === selectedLevel ? 'active' : ''}`;
            d.innerText = l.name;
            d.onclick = () => { selectedLevel = i; initUI(); };
            lg.appendChild(d);
        });

        const sg = document.getElementById('skin-grid'); sg.innerHTML = '';
        crafts.forEach((s, i) => {
            const isOwned = ownedSkins.includes(i);
            const d = document.createElement('div');
            d.className = `card ${i === selectedSkin ? 'active' : ''} ${isOwned ? 'owned' : 'locked'}`;
            d.innerHTML = `<span class="skin-icon" style="color:${s.color}">${s.icon}</span>${s.name}<br><span class="price-tag">${isOwned ? 'OWNED' : s.price}</span>`;
            d.onclick = () => {
                if(isOwned) { selectedSkin = i; localStorage.setItem('sh_skin_idx', i); }
                else if(totalCoins >= s.price) {
                    totalCoins -= s.price; ownedSkins.push(i); selectedSkin = i;
                    localStorage.setItem('sh_coins', totalCoins);
                    localStorage.setItem('sh_skins', JSON.stringify(ownedSkins));
                    localStorage.setItem('sh_skin_idx', i);
                }
                initUI();
            };
            sg.appendChild(d);
        });
        document.getElementById('total-coins-display').innerText = totalCoins;
        document.getElementById('best-ui').innerText = Math.floor(bestDist/10);
    }

    function launchGame() {
        document.getElementById('menu').style.display = 'none';
        active = true; score = 0; coins = 0; lives = 3;
        obstacles = []; gameOrbs = []; player.y = canvas.height/2; player.vy = 0;
        loop();
    }

    window.onmousedown = () => { if(active) player.vy = levels[selectedLevel].jump; };
    window.onkeydown = (e) => { if(e.code === 'Space' && active) player.vy = levels[selectedLevel].jump; };

    function loop() {
        if(!active) return;
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        const lvl = levels[selectedLevel];
        player.vy += lvl.grav; player.y += player.vy;
        
        if(player.y < 0 || player.y > canvas.height) hit();

        if(score % 60 === 0) {
            let h = Math.random() * (canvas.height/2);
            obstacles.push({x: canvas.width, w: 50, h: h, pos: Math.random() > 0.5 ? 'top' : 'bottom'});
        }
        obstacles.forEach((o, i) => {
            o.x -= lvl.speed;
            ctx.fillStyle = crafts[selectedSkin].color;
            if(o.pos === 'top') ctx.fillRect(o.x, 0, o.w, o.h);
            else ctx.fillRect(o.x, canvas.height-o.h, o.w, o.h);

            if(player.x+20 > o.x && player.x-20 < o.x+o.w) {
                if(o.pos === 'top' && player.y < o.h) hit();
                if(o.pos === 'bottom' && player.y > canvas.height-o.h) hit();
            }
            if(o.x < -100) obstacles.splice(i, 1);
        });

        if(score % 150 === 0) gameOrbs.push({x: canvas.width, y: Math.random()*canvas.height});
        gameOrbs.forEach((orb, i) => {
            orb.x -= lvl.speed;
            ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(orb.x, orb.y, 8, 0, Math.PI*2); ctx.fill();
            if(Math.hypot(player.x-orb.x, player.y-orb.y) < 30) {
                coins += 10; totalCoins += 10; gameOrbs.splice(i, 1);
            }
        });

        ctx.fillStyle = crafts[selectedSkin].color;
        ctx.beginPath(); ctx.moveTo(player.x+20, player.y); ctx.lineTo(player.x-15, player.y+12); ctx.lineTo(player.x-15, player.y-12); ctx.fill();

        score++;
        document.getElementById('dist-val').innerText = Math.floor(score/10);
        document.getElementById('coin-val').innerText = coins;
        document.getElementById('hull-val').innerText = "♥".repeat(lives);
        requestAnimationFrame(loop);
    }

    function hit() {
        lives--; player.y = canvas.height/2; player.vy = 0;
        if(lives <= 0) {
            active = false; document.getElementById('menu').style.display = 'flex';
            if(score > bestDist) { bestDist = score; localStorage.setItem('sh_best', bestDist); }
            localStorage.setItem('sh_coins', totalCoins);
            initUI();
        }
    }

    function showSection(s) {
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('section-'+s).classList.add('active');
        document.getElementById('btn'+s.charAt(0).toUpperCase()+s.slice(1)).classList.add('active');
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize(); initUI();
</script>
</body>
</html>
